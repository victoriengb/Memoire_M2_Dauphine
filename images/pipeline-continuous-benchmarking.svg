<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 720" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="600" height="720" fill="#ffffff"/>

  <!-- 3 triggers séparés -->
  <rect x="20" y="20" width="160" height="50" rx="10" fill="#eef2f7" stroke="#34495e" stroke-width="1.5"/>
  <text x="100" y="50" text-anchor="middle" font-size="13" fill="#2c3e50">PR</text>

  <rect x="220" y="20" width="160" height="50" rx="10" fill="#eef2f7" stroke="#34495e" stroke-width="1.5"/>
  <text x="300" y="50" text-anchor="middle" font-size="13" fill="#2c3e50">push sur main</text>

  <rect x="420" y="20" width="160" height="50" rx="10" fill="#eef2f7" stroke="#34495e" stroke-width="1.5"/>
  <text x="500" y="50" text-anchor="middle" font-size="13" fill="#2c3e50">déclenchement manuel</text>

  <!-- convergence vers build-and-test -->
  <line x1="100" y1="70" x2="295" y2="135" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="300" y1="70" x2="300" y2="135" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="70" x2="305" y2="135" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- build-and-test -->
  <rect x="150" y="140" width="300" height="70" rx="10" fill="#eaf6ec" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="300" y="168" text-anchor="middle" font-size="15" font-weight="600" fill="#1b5e20">build-and-test</text>
  <text x="300" y="188" text-anchor="middle" font-size="13" fill="#1b5e20">compilation + tests unitaires</text>

  <line x1="300" y1="210" x2="300" y2="245" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- benchmark -->
  <rect x="150" y="250" width="300" height="70" rx="10" fill="#fff4e0" stroke="#b8860b" stroke-width="1.5"/>
  <text x="300" y="278" text-anchor="middle" font-size="15" font-weight="600" fill="#7a5200">benchmark</text>
  <text x="300" y="298" text-anchor="middle" font-size="13" fill="#7a5200">exécution JMH, sortie JSON</text>

  <line x1="300" y1="320" x2="300" y2="330" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- compare-baseline (gate) -->
  <polygon points="300,328 460,400 300,472 140,400" fill="#fdeaea" stroke="#a93226" stroke-width="1.5"/>
  <text x="300" y="392" text-anchor="middle" font-size="14" font-weight="600" fill="#7b241c">compare-baseline</text>
  <text x="300" y="410" text-anchor="middle" font-size="11" fill="#7b241c">gate de régression</text>
  <text x="300" y="424" text-anchor="middle" font-size="11" fill="#7b241c">vs baseline.json</text>

  <!-- branche gauche : pas de régression -->
  <line x1="230" y1="440" x2="150" y2="570" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="170" y="495" text-anchor="middle" font-size="12" fill="#333333">pas de</text>
  <text x="170" y="510" text-anchor="middle" font-size="12" fill="#333333">régression</text>

  <!-- branche droite : régression détectée -->
  <line x1="372" y1="440" x2="450" y2="570" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="430" y="495" text-anchor="middle" font-size="12" fill="#333333">régression</text>
  <text x="430" y="510" text-anchor="middle" font-size="12" fill="#333333">détectée</text>

  <!-- merge autorisé -->
  <ellipse cx="150" cy="610" rx="90" ry="35" fill="#e8f8ee" stroke="#1e8449" stroke-width="1.5"/>
  <text x="150" y="615" text-anchor="middle" font-size="13" font-weight="600" fill="#1e8449">merge autorisé</text>

  <!-- build bloqué -->
  <ellipse cx="450" cy="610" rx="90" ry="35" fill="#fbeaea" stroke="#922b21" stroke-width="1.5"/>
  <text x="450" y="615" text-anchor="middle" font-size="13" font-weight="600" fill="#922b21">build bloqué</text>
</svg>
